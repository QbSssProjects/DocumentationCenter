    <style>
        .markdown-body {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 2rem;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 16px;
        }

        .markdown-body pre {
            background: #1e1e1e !important;
            padding: 1rem !important;
            border-radius: 8px !important;
            overflow-x: auto !important;
            margin: 1rem 0 !important;
        }

        .markdown-body code {
            font-family: 'Consolas', 'Monaco', 'Courier New', monospace;
            font-size: 0.9em;
        }

        /* Inline code */
        .markdown-body :not(pre) > code {
            background: rgba(255, 255, 255, 0.1);
            padding: 0.2em 0.4em;
            border-radius: 4px;
            color: #f8c555;
        }

        /* Numer linii (opcjonalnie) */
        .hljs-ln-numbers {
            text-align: right;
            color: #6e7681;
            border-right: 1px solid #3d444d;
            padding-right: 10px;
            margin-right: 10px;
        }

        /* ═══════════════════════════════════════════════════════════════ */
        /* TABELE - JAWNE STYLING W TEMPLATE'U */
        /* ═══════════════════════════════════════════════════════════════ */

        .markdown-body table {
            border-collapse: collapse !important;
            width: 100% !important;
            margin: 1.5rem 0 !important;
            border: 2px solid #ffffff !important;
            border-radius: 8px !important;
            overflow: hidden !important;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.3) !important;
        }

        /* Nagłówek tabeli */
        .markdown-body table thead {
            background: linear-gradient(135deg, rgba(99, 102, 241, 0.3) 0%, rgba(99, 102, 241, 0.15) 100%) !important;
            border-bottom: 2px solid #6366f1 !important;
        }

        .markdown-body table thead th {
            padding: 1rem 1.2rem !important;
            text-align: left !important;
            font-weight: 700 !important;
            color: #ffffff !important;
            border-right: 1px solid #ffffff !important;
            border: 1px solid #ffffff !important;
        }

        .markdown-body table thead th:last-child {
            border-right: none !important;
        }

        /* Ciało tabeli */
        .markdown-body table tbody {
            background-color: rgba(255, 255, 255, 0.02) !important;
        }

        .markdown-body table tbody tr {
            border-bottom: 1px solid #ffffff !important;
            transition: background-color 0.2s ease !important;
        }

        .markdown-body table tbody tr:hover {
            background-color: rgba(99, 102, 241, 0.15) !important;
        }

        .markdown-body table tbody tr:last-child {
            border-bottom: none !important;
        }

        /* Komórki tabeli */
        .markdown-body table td {
            padding: 0.9rem 1.2rem !important;
            border-right: 1px solid #ffffff !important;
            border: 1px solid #ffffff !important;
            color: #f0f0f0 !important;
        }

        .markdown-body table td:last-child {
            border-right: none !important;
        }

        /* Code w tabelach */
        .markdown-body table code {
            background-color: rgba(255, 255, 255, 0.1) !important;
            border: 1px solid rgba(255, 255, 255, 0.2) !important;
            padding: 0.25rem 0.5rem !important;
            border-radius: 3px !important;
            font-size: 0.9em !important;
            color: #00e5ff !important;
        }

        /* Links w tabelach */
        .markdown-body table a {
            color: #6366f1 !important;
            text-decoration: none !important;
        }

        .markdown-body table a:hover {
            border-bottom-color: #6366f1 !important;
            color: #818cf8 !important;
        }
    </style>

<script>
    // Inicjalizacja syntax highlighting
    document.addEventListener('DOMContentLoaded', (event) => {
        document.querySelectorAll('pre code').forEach((block) => {
            hljs.highlightElement(block);
        });
    });
</script>
