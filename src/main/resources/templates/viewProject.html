<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/mainStyles.css}">

    <meta charset="UTF-8">
    <title>Projekt - ZenSpace</title>
</head>
<body>
<nav>
    <div class="logo">ZenSpace</div>
    <ul>
        <li><a href="http://localhost:8080/">Home</a></li>
        <li><a href="http://localhost:8080/viewDocs">Projekty</a></li>
    </ul>
</nav>

<main class="main-content">
    <!-- ✅ ZMIENIONO: Wyświetlanie informacji o projekcie -->
    <div style="margin-bottom: 2rem;">
        <h2 th:text="${project.name}">Nazwa Projektu</h2>
        <p th:text="${project.description}" th:if="${project.description}" style="color: var(--text-secondary); margin-top: 0.5rem;">
            Opis projektu
        </p>
        <small style="color: var(--text-secondary);">
            Dokumentów: <span th:text="${documentCount}">0</span>
        </small>
    </div>

    <div class="card-container">
        <!-- ✅ ZMIENIONO: Dokumenty dla TEGO projektu -->
        <div th:each="doc : ${project.documents}" class="card">
            <a th:href="@{/docs/view/{id}(id=${doc.id})}">
                <h3 th:text="${doc.title}">Document Title</h3>
                <p th:text="${doc.description}">Short description...</p>
            </a>
            <a th:href="@{/docs/delete/{id}(id=${doc.id})}"><button class="btn btn-red">usun</button></a>
            <a th:href="@{/docs/edit/{id}(id=${doc.id})}"><button class="btn btn-green">edytuj</button></a>
        </div>
    </div>

    <p th:if="${#lists.isEmpty(project.documents)}" style="text-align: center; color: var(--text-secondary); margin: 2rem 0;">
        Brak dokumentów w tym projekcie
    </p>

    <div style="display: flex; gap: 10px; flex-wrap: wrap; margin-top: 2rem;">
        <!-- ✅ NOWY: Przycisk do tworzenia dokumentu W PROJEKCIE -->
        <a th:href="@{/docs/new/{projectId}(projectId=${project.id})}" class="btn btn-green">
            ➕ Dodaj nowy dokument
        </a>
        <!-- Powrót do listy projektów -->
        <a href="http://localhost:8080/viewDocs" class="btn btn-blue">
            ← Wróć do projektów
        </a>
    </div>
</main>
</body>
</html>
