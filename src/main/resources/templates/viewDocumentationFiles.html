<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" th:href="@{/css/mainStyles.css}">

    <meta charset="UTF-8">
    <title>Przeglądarka dokumentacji</title>
</head>
<body>
<nav>
    <div class="logo">ZenSpace</div>
    <ul>
        <li><a href="http://localhost:8080/">Home</a></li>
        <li><a href="http://localhost:8080/viewDocs">Pliki</a></li>

    </ul>
</nav>

<main class="main-content">
    <div class="sidenav">
        <a th:each="project : ${projects}"
           th:text="${project.name}"
           th:href="@{/projects/{id}(id=${project.id})}">
        </a>

    </div>

    <div class="card-grid">

        <div class="card-container">
            <div th:each="doc : ${documents}" class="card">
                <a th:href="@{/docs/view/{id}(id=${doc.id})}">
                    <h3 th:text="${doc.title}">Document Title</h3>
                    <p th:text="${doc.description}">Short description...</p>
                </a>
            </div>
        </div>

    </div>


    <p th:if="${#lists.isEmpty(projects)}" style="text-align: center; color: var(--text-secondary);">
        Brak projektów. <a href="/projects/new" style="color: var(--accent);">Utwórz pierwszy projekt</a>
    </p>
    <div style="display: flex; gap: 10px; flex-wrap: wrap;">
        <a href="/projects/new" class="btn btn-green">➕ Dodaj nowy projekt</a>
    </div>
</main>
</body>
</html>
